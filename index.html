<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter From My Quiet Thoughts</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background">
        <!-- Floating lavender flowers -->
        <img src="assets/lavender1.png" class="flower flower1" alt="Lavender flower">
        <img src="assets/lavender2.png" class="flower flower2" alt="Lavender flower">
        <img src="assets/lavender3.png" class="flower flower3" alt="Lavender flower">
        <img src="assets/lavender_corner.png" class="flower flower-corner" alt="Lavender corner">
    </div>
    <div class="letter-frame">
        <h1>A Letter From My Quiet Thoughts</h1>
        <h2>Written in the silence where you live in my mind</h2>
        <div class="letter-text" id="letter-text"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
